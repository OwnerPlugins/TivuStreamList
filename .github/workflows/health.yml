name: Playlist Healt

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-streams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: list

      - name: Run health check
        run: |
          PLAYLIST="ios/playlist.m3u"
          REPORT="health_report.txt"
          DOWN_FILE="down_channels.txt"
          SKIP_LIST="(Teledue|Boing Plus|Canale 63)"

          echo "=== START ==="
          echo "Cerco playlist in: $PLAYLIST"

          if [ ! -f "$PLAYLIST" ]; then
              echo "ERROR: Playlist not found" > $REPORT
              exit 1
          fi

          echo "Playlist trovata! $(wc -l < "$PLAYLIST") righe"

          # Inizializza i report
          echo "Playlist Health Check Report" > $REPORT
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M UTC")" >> $REPORT
          echo "" >> $REPORT

          # Inizializza il file dei canali down
          echo "# CANALI DOWN" > $DOWN_FILE
          echo "# Generated: $(date -u +"%Y-%m-%d %H:%M UTC")" >> $DOWN_FILE
          echo "# Formato: NOME_CANALE URL" >> $DOWN_FILE
          echo "" >> $DOWN_FILE

          echo "=== EPG ==="
          EPG_URL=$(grep -oP 'x-tvg-url="\K[^"]+' "$PLAYLIST" | head -1)
          if [ -n "$EPG_URL" ]; then
              echo "Scarico EPG da: $EPG_URL"
              curl -s "$EPG_URL" -o epg.xml.gz
              gunzip -f epg.xml.gz 2>/dev/null && EPG_AVAILABLE=1 || EPG_AVAILABLE=0
              echo "EPG disponibile: $EPG_AVAILABLE"
          else
              EPG_AVAILABLE=0
              echo "EPG non trovato"
          fi

          echo "--- Details ---" >> $REPORT
          echo "" >> $REPORT

          echo "=== Estrazione canali ==="
          TMP_FILE=$(mktemp)
          awk '/^#EXTINF/ {extinf=$0} /^https?:\/\// {if(extinf!=""){print extinf"\t"$0; extinf=""}}' "$PLAYLIST" > "$TMP_FILE"

          TOTAL_LINES=$(wc -l < "$TMP_FILE")
          echo "Trovati $TOTAL_LINES canali da testare"

          TOTAL=0
          WORKING=0
          DOWN=0
          SKIPPED=0
          EPG_OK=0
          EPG_MISSING=0
          COUNT=0

          echo "=== Inizio test canali ==="
          while IFS=$'\t' read -r extinf url; do
              COUNT=$((COUNT+1))
              CHANNEL_NAME=$(echo "$extinf" | sed 's/.*,//')
              TVG_ID=$(echo "$extinf" | sed -n 's/.*tvg-id="\([^"]*\)".*/\1/p')

              echo "[$COUNT/$TOTAL_LINES] Test: $CHANNEL_NAME"

              if [ -z "$url" ]; then
                  echo "[SKIP] $CHANNEL_NAME | No URL" >> $REPORT
                  SKIPPED=$((SKIPPED+1))
                  continue
              fi

              if [[ $url == *"startend.avi"* ]]; then
                  echo "[SKIP] $CHANNEL_NAME | Placeholder" >> $REPORT
                  SKIPPED=$((SKIPPED+1))
                  continue
              fi

              if [[ $CHANNEL_NAME =~ $SKIP_LIST ]]; then
                  echo "[SKIP] $CHANNEL_NAME | Known issue" >> $REPORT
                  SKIPPED=$((SKIPPED+1))
                  continue
              fi

              TOTAL=$((TOTAL+1))

              if curl -Is --max-time 2 "$url" >/dev/null 2>&1; then
                  STREAM_STATUS="OK"
                  WORKING=$((WORKING+1))
                  echo "  ✅ OK"
              else
                  STREAM_STATUS="DOWN"
                  DOWN=$((DOWN+1))
                  echo "  ❌ DOWN"
                  
                  # SALVA nel file dei canali down: NOME LINK
                  echo "$CHANNEL_NAME $url" >> $DOWN_FILE
              fi

              if [[ $EPG_AVAILABLE -eq 1 && -n "$TVG_ID" ]] && grep -q "channel id=\"$TVG_ID\"" epg.xml 2>/dev/null; then
                  EPG_STATUS="EPG OK"
                  EPG_OK=$((EPG_OK+1))
              else
                  EPG_STATUS="EPG MISSING"
                  EPG_MISSING=$((EPG_MISSING+1))
              fi

              echo "[$STREAM_STATUS] $CHANNEL_NAME | $STREAM_STATUS | $EPG_STATUS" >> $REPORT
          done < "$TMP_FILE"

          echo "=== Test completati ==="
          rm -f "$TMP_FILE" epg.xml.gz epg.xml

          # Riepilogo nel report
          echo "" >> $REPORT
          echo "Total tested: $TOTAL" >> $REPORT
          echo "Skipped: $SKIPPED" >> $REPORT
          echo "Working: $WORKING" >> $REPORT
          echo "Broken: $DOWN" >> $REPORT
          echo "EPG OK: $EPG_OK" >> $REPORT
          echo "EPG Missing: $EPG_MISSING" >> $REPORT

          # Aggiunge la lista dei canali down alla fine del report
          echo "" >> $REPORT
          echo "=== CANALI NON FUNZIONANTI ($DOWN) ===" >> $REPORT
          if [ -f "$DOWN_FILE" ] && [ $(wc -l < "$DOWN_FILE") -gt 4 ]; then
              cat "$DOWN_FILE" >> $REPORT
          else
              echo "Nessun canale down" >> $REPORT
          fi

          echo "=== REPORT GENERATO ==="
          echo "Report completo: $REPORT"
          echo "File canali down: $DOWN_FILE"

      - name: Commit report
        run: |
          echo "=== COMMIT REPORT ==="
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p reports
          
          # Copia i file nella cartella reports
          cp health_report.txt reports/latest_report.txt
          cp down_channels.txt reports/down_channels.txt
          
          # Aggiungi entrambi i file
          git add reports/latest_report.txt reports/down_channels.txt
          
          git diff --staged --quiet || {
            echo "Nuovi report da committare"
            git commit -m "Update reports $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin list
            echo "Report committati!"
          }
          echo "=== FINE ==="
