name: Playlist Healt

on:
  schedule:
    - cron: "0 0 * * *"          # Ogni giorno a mezzanotte UTC
  workflow_dispatch:             # Permette di lanciarlo manualmente

jobs:
  check-streams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # Necessario per il push

      - name: Run health check
        run: |
          PLAYLIST="ios/playlist.m3u"
          REPORT="health_report.txt"
          SKIP_LIST="(Teledue|Boing Plus|Canale 63)"

          echo "Playlist Health Check Report" > $REPORT
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M UTC")" >> $REPORT
          echo "" >> $REPORT

          # Estrai EPG_URL dalla playlist
          EPG_URL=$(grep -oP 'x-tvg-url="\K[^"]+' "$PLAYLIST" | head -1)
          if [ -n "$EPG_URL" ]; then
              echo "Scarico EPG da: $EPG_URL"
              curl -s "$EPG_URL" -o epg.xml.gz
              if gunzip -f epg.xml.gz 2>/dev/null; then
                  EPG_AVAILABLE=1
              else
                  echo "Attenzione: EPG non decompresso correttamente"
                  EPG_AVAILABLE=0
              fi
          else
              echo "EPG URL non trovato nella playlist, salto controllo EPG"
              EPG_AVAILABLE=0
          fi

          echo "--- Details ---" >> $REPORT
          echo "" >> $REPORT

          # Inizializza i contatori
          TOTAL=0
          WORKING=0
          DOWN=0
          SKIPPED=0
          EPG_OK=0
          EPG_MISSING=0

          # Legge la playlist senza creare subshell (process substitution)
          while read -r LINE; do
              if [[ $LINE == \#EXTINF* ]]; then
                  CHANNEL_NAME=$(echo "$LINE" | sed 's/.*,//')
                  TVG_ID=$(echo "$LINE" | sed -n 's/.*tvg-id="\([^"]*\)".*/\1/p')
                  continue
              fi

              URL="$LINE"

              # Salta i canali con problemi noti
              if [[ $CHANNEL_NAME =~ $SKIP_LIST ]]; then
                  echo "[SKIP]  $CHANNEL_NAME | Skipped (known issue)" >> $REPORT
                  SKIPPED=$((SKIPPED+1))
                  continue
              fi

              TOTAL=$((TOTAL+1))

              # Verifica lo stream
              if curl -Is --max-time 5 "$URL" >/dev/null 2>&1; then
                  STREAM_STATUS="OK"
                  WORKING=$((WORKING+1))
              else
                  STREAM_STATUS="DOWN"
                  DOWN=$((DOWN+1))
              fi

              # Verifica EPG
              if [[ $EPG_AVAILABLE -eq 1 && -n "$TVG_ID" ]] && grep -q "channel id=\"$TVG_ID\"" epg.xml 2>/dev/null; then
                  EPG_STATUS="EPG OK"
                  EPG_OK=$((EPG_OK+1))
              else
                  EPG_STATUS="EPG MISSING"
                  EPG_MISSING=$((EPG_MISSING+1))
              fi

              echo "[$STREAM_STATUS]  $CHANNEL_NAME | Stream $STREAM_STATUS | $EPG_STATUS" >> $REPORT

          done < <(awk '/^#EXTINF/ { extinf=$0 } /^http/ { print extinf "\n" $0 }' "$PLAYLIST")

          # Scrive il riepilogo
          echo "" >> $REPORT
          echo "Total channels tested: $TOTAL" >> $REPORT
          echo "Skipped: $SKIPPED" >> $REPORT
          echo "Working streams: $WORKING" >> $REPORT
          echo "Broken streams: $DOWN" >> $REPORT
          echo "EPG OK: $EPG_OK" >> $REPORT
          echo "EPG Missing: $EPG_MISSING" >> $REPORT

      - name: Commit report to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p reports

          # Copia il report con data nel nome
          cp health_report.txt "reports/health_report_$(date +%Y-%m-%d).txt"
          # Sovrascrive sempre l'ultimo report
          cp health_report.txt reports/latest_report.txt

          git add reports/

          if git diff --staged --quiet; then
            echo "Nessuna modifica da committare"
          else
            git commit -m "Aggiornamento report salute playlist $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
