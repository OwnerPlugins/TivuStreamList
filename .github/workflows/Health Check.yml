name: Playlist Healt

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-streams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: list

      - name: Run health check
        run: |
          PLAYLIST="ios/playlist.m3u"
          REPORT="health_report.txt"
          SKIP_LIST="(Teledue|Boing Plus|Canale 63)"

          if [ ! -f "$PLAYLIST" ]; then
              echo "ERROR: Playlist file not found at $PLAYLIST" > $REPORT
              echo "Directory contents:" >> $REPORT
              ls -la >> $REPORT
              exit 1
          fi

          echo "Playlist Health Check Report" > $REPORT
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M UTC")" >> $REPORT
          echo "" >> $REPORT
          echo "Playlist size: $(wc -c < "$PLAYLIST") bytes" >> $REPORT
          echo "Number of lines: $(wc -l < "$PLAYLIST")" >> $REPORT

          # EPG extraction
          EPG_URL=$(grep -oP 'x-tvg-url="\K[^"]+' "$PLAYLIST" | head -1)
          if [ -n "$EPG_URL" ]; then
              echo "Scarico EPG da: $EPG_URL" >> $REPORT
              curl -s "$EPG_URL" -o epg.xml.gz
              if gunzip -f epg.xml.gz 2>/dev/null; then
                  EPG_AVAILABLE=1
              else
                  EPG_AVAILABLE=0
              fi
          else
              EPG_AVAILABLE=0
          fi

          echo "" >> $REPORT
          echo "--- Details ---" >> $REPORT
          echo "" >> $REPORT

          TOTAL=0
          WORKING=0
          DOWN=0
          SKIPPED=0
          EPG_OK=0
          EPG_MISSING=0

          # Legge il file riga per riga
          while IFS= read -r LINE; do
              if [[ $LINE == \#EXTINF* ]]; then
                  CHANNEL_NAME=$(echo "$LINE" | sed 's/.*,//')
                  TVG_ID=$(echo "$LINE" | sed -n 's/.*tvg-id="\([^"]*\)".*/\1/p')

                  # Cerca la prossima riga che inizia con http (salta #EXTVLCOPT, commenti, ecc.)
                  while IFS= read -r NEXT_LINE; do
                      if [[ $NEXT_LINE =~ ^https?:// ]]; then
                          URL="$NEXT_LINE"
                          break
                      fi
                      # Se la riga successiva è #EXTINF o fine file, esci
                      if [[ $NEXT_LINE == \#EXTINF* ]] || [[ -z "$NEXT_LINE" ]]; then
                          URL=""
                          break
                      fi
                  done < <(tail -n +$((LINENO+1)) "$PLAYLIST" | head -n 10)  # Cerca nelle prossime 10 righe

                  if [ -z "$URL" ]; then
                      echo "[SKIP]  $CHANNEL_NAME | No URL found" >> $REPORT
                      continue
                  fi

                  # Salta i placeholder
                  if [[ $URL == *"startend.avi"* ]]; then
                      echo "[SKIP]  $CHANNEL_NAME | Placeholder skipped" >> $REPORT
                      SKIPPED=$((SKIPPED+1))
                      continue
                  fi

                  if [[ $CHANNEL_NAME =~ $SKIP_LIST ]]; then
                      echo "[SKIP]  $CHANNEL_NAME | Skipped (known issue)" >> $REPORT
                      SKIPPED=$((SKIPPED+1))
                      continue
                  fi

                  TOTAL=$((TOTAL+1))

                  # Verifica lo stream (solo m3u8/mpd/playlist.m3u8)
                  if curl -Is --max-time 5 "$URL" >/dev/null 2>&1; then
                      STREAM_STATUS="OK"
                      WORKING=$((WORKING+1))
                  else
                      STREAM_STATUS="DOWN"
                      DOWN=$((DOWN+1))
                  fi

                  # Verifica EPG
                  if [[ $EPG_AVAILABLE -eq 1 && -n "$TVG_ID" ]] && grep -q "channel id=\"$TVG_ID\"" epg.xml 2>/dev/null; then
                      EPG_STATUS="EPG OK"
                      EPG_OK=$((EPG_OK+1))
                  else
                      EPG_STATUS="EPG MISSING"
                      EPG_MISSING=$((EPG_MISSING+1))
                  fi

                  echo "[$STREAM_STATUS]  $CHANNEL_NAME | Stream $STREAM_STATUS | $EPG_STATUS" >> $REPORT
              fi
          done < "$PLAYLIST"

          echo "" >> $REPORT
          echo "Total channels tested: $TOTAL" >> $REPORT
          echo "Skipped: $SKIPPED" >> $REPORT
          echo "Working streams: $WORKING" >> $REPORT
          echo "Broken streams: $DOWN" >> $REPORT
          echo "EPG OK: $EPG_OK" >> $REPORT
          echo "EPG Missing: $EPG_MISSING" >> $REPORT

      - name: Commit report to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p reports
          cp health_report.txt "reports/health_report_$(date +%Y-%m-%d).txt"
          cp health_report.txt reports/latest_report.txt
          git add reports/
          if git diff --staged --quiet; then
            echo "Nessuna modifica da committare"
          else
            git commit -m "Aggiornamento report salute playlist $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
